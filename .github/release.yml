changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: 新功能
      labels:
        - enhancement
        - feature
    - title: Bug 修复
      labels:
        - bug
        - fix
    - title: 安全与来源政策
      labels:
        - security
        - source-policy
    - title: 文档与维护
      labels:
        - documentation
        - maintenance
    - title: 其他变更
      labels:
        - "*"
