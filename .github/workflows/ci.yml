name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  SKILL_DIR: skills/hk-pre-owned-rolex-monitoring

jobs:
  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: ${{ env.SKILL_DIR }}/pyproject.toml
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./${SKILL_DIR}[test]"
      - name: Run offline tests
        run: python -m pytest -q "${SKILL_DIR}/tests" tests

  validate:
    name: Skill and publication validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: ${{ env.SKILL_DIR }}/pyproject.toml
      - name: Install validators
        run: python -m pip install skills-ref==0.1.1
      - name: Validate Agent Skill structure
        run: agentskills validate "${SKILL_DIR}"
      - name: Validate publication draft
        run: python scripts/check_publication.py --mode ci
      - name: Validate schemas and Python syntax
        run: |
          python -c 'import json, pathlib; [json.loads(p.read_text()) for p in pathlib.Path("skills/hk-pre-owned-rolex-monitoring/assets/schemas").glob("*.json")]'
          python -m compileall -q "${SKILL_DIR}/src" "${SKILL_DIR}/scripts"

  package:
    name: Build and clean-install package
    runs-on: ubuntu-latest
    needs: [tests, validate]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: ${{ env.SKILL_DIR }}/pyproject.toml
      - name: Build wheel and source archive
        run: |
          python -m pip install --upgrade pip
          python -m pip install "build>=1,<2"
          python -m build "${SKILL_DIR}" --outdir "${RUNNER_TEMP}/dist"
      - name: Clean-install wheel
        run: |
          python -m venv "${RUNNER_TEMP}/clean"
          "${RUNNER_TEMP}/clean/bin/python" -m pip install "${RUNNER_TEMP}"/dist/*.whl
          "${RUNNER_TEMP}/clean/bin/inventoryctl" skill info --json > "${RUNNER_TEMP}/skill-info.json"
          "${RUNNER_TEMP}/clean/bin/python" -c 'import json, os; p=json.load(open(os.environ["RUNNER_TEMP"] + "/skill-info.json")); assert p["ok"] and p["result"]["platform_neutral"] is True'
